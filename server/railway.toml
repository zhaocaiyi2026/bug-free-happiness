[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node dist/index.js"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "zcy-api"

[services.source]
repo = "你的GitHub用户名/zcy-app"
branch = "main"

[services.variables]
NODE_ENV = "production"
PORT = "9000"
