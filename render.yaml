# Render 部署配置（Monorepo 结构）
# 适用于招采易后端 API 服务 - 轻量版（无 Playwright）

services:
  - type: web
    name: zcy-api
    env: docker
    # 使用轻量版 Dockerfile（适合 512MB 内存限制）
    dockerfilePath: ./server/Dockerfile.lite
    # 构建上下文为 server 目录
    dockerContext: ./server
    region: singapore
    plan: free
    # 健康检查
    healthCheckPath: /api/v1/health
    # 环境变量
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "9091"
      - key: COZE_SUPABASE_URL
        sync: false
      - key: COZE_SUPABASE_ANON_KEY
        sync: false
